<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>声悦 - 测试页面</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Noto Sans SC', system-ui, sans-serif;
      background: linear-gradient(135deg, #fdf2f8 0%, #fce7f3 50%, #f3e8ff 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 600px;
      padding: 40px;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
      text-align: center;
    }
    h1 {
      font-size: 48px;
      background: linear-gradient(135deg, #ec4899 0%, #a855f7 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 20px;
    }
    p {
      color: #6b7280;
      margin-bottom: 30px;
      line-height: 1.6;
    }
    .button {
      display: inline-block;
      padding: 16px 48px;
      background: linear-gradient(135deg, #ec4899 0%, #a855f7 100%);
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
    }
    .button:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(236, 72, 153, 0.4);
    }
    .features {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin: 30px 0;
    }
    .feature {
      padding: 20px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
    }
    .feature-icon {
      font-size: 32px;
      margin-bottom: 10px;
    }
    .feature-title {
      font-weight: 600;
      color: #374151;
      margin-bottom: 8px;
    }
    .feature-desc {
      font-size: 14px;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>声悦</h1>
    <p>你的智能情感陪伴伙伴<br>在这里找到温暖与理解</p>

    <div class="features">
      <div class="feature">
        <div class="feature-icon">💬</div>
        <div class="feature-title">情感陪伴</div>
        <div class="feature-desc">温暖的话语，真诚的倾听</div>
      </div>
      <div class="feature">
        <div class="feature-icon">✨</div>
        <div class="feature-title">个性化记忆</div>
        <div class="feature-desc">记住你的喜好，理解你的心情</div>
      </div>
      <div class="feature">
        <div class="feature-icon">🎤</div>
        <div class="feature-title">语音对话</div>
        <div class="feature-desc">自然流畅的语音交互</div>
      </div>
    </div>

    <a href="http://localhost:3001" class="button">
      开始旅程
    </a>

    <p style="margin-top: 30px; font-size: 14px; color: #9ca3af;">
      点击按钮打开声悦应用
    </p>
  </div>
</body>
</html>
